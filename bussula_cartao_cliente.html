<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bússola Imobiliária · Cartão de Zona</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#0d3d3a;--teal-mid:#1aaa96;--gold:#c9a84c;--gold-light:#e0c06e;
    --gold-dim:#8a6f30;--cream:#f5efe4;--text:#f0e8d8;--text-dim:#b8aa90;
    --border:rgba(201,168,76,0.3);--card:rgba(255,255,255,0.04);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--teal);color:var(--text);font-family:'Montserrat',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 60px;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 30%,rgba(201,168,76,0.07) 0%,transparent 55%),radial-gradient(ellipse at 80% 70%,rgba(26,170,150,0.15) 0%,transparent 50%);pointer-events:none;z-index:0;}

  /* ── EDITOR ── */
  .editor{position:relative;z-index:10;background:rgba(201,168,76,0.06);border:1px solid var(--border);border-radius:6px;padding:28px 32px;width:100%;max-width:600px;margin-bottom:32px;}
  .editor-title{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:20px;}

  /* Selector perfil */
  .perfil-selector{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
  .perfil-btn{padding:14px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-family:'Montserrat',sans-serif;font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;text-align:center;}
  .perfil-btn .icon{display:block;font-size:20px;margin-bottom:6px;}
  .perfil-btn.active{border-color:var(--gold);background:rgba(201,168,76,0.1);color:var(--gold);}

  .field-group{margin-bottom:18px;}
  .field-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;display:block;}
  .field-input,.field-select,.field-textarea{width:100%;background:rgba(0,0,0,0.2);border:1px solid rgba(201,168,76,0.2);border-radius:3px;padding:10px 14px;color:var(--cream);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:300;outline:none;transition:border-color .2s;}
  .field-input:focus,.field-select:focus,.field-textarea:focus{border-color:var(--gold);}
  .field-select option{background:#0d3d3a;color:var(--cream);}
  .field-textarea{resize:vertical;min-height:80px;line-height:1.6;}
  .btn-generate{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));border:none;border-radius:3px;color:#0d3d3a;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:8px;transition:opacity .2s;}
  .btn-generate:hover{opacity:.85;}

  /* ── CARD ── */
  .card-wrap{position:relative;z-index:1;width:100%;max-width:600px;display:none;}
  .card{border-radius:8px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,0.5);border:1px solid var(--border);}

  /* Comprador: teal escuro */
  .card.comprador{background:var(--teal-mid);}
  /* Vendedor: ligeiramente mais quente */
  .card.vendedor{background:#0d5a4e;}

  .card-header{padding:36px 36px 28px;border-bottom:1px solid var(--border);position:relative;}
  .card.comprador .card-header{background:linear-gradient(135deg,#0a3d35,#0d6b5e);}
  .card.vendedor .card-header{background:linear-gradient(135deg,#0a3d35,#0d6b5e);}
  .card-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}

  .card-badge{display:inline-flex;align-items:center;gap:6px;font-size:8px;letter-spacing:3px;text-transform:uppercase;padding:4px 10px;border-radius:20px;border:1px solid;margin-bottom:14px;font-weight:500;}
  .card.comprador .card-badge{color:#7fc99a;border-color:rgba(127,201,154,0.4);background:rgba(127,201,154,0.08);}
  .card.vendedor .card-badge{color:var(--gold-light);border-color:rgba(201,168,76,0.4);background:rgba(201,168,76,0.08);}

  .card-eyebrow{font-size:8px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
  .card-zona{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,5vw,38px);font-weight:300;color:var(--cream);line-height:1.1;margin-bottom:4px;}
  .card-zona em{font-style:italic;color:var(--gold-light);}
  .card-regiao{font-size:10px;letter-spacing:1.5px;color:var(--text-dim);text-transform:uppercase;}

  /* Saudação */
  .card-greeting{padding:28px 36px 0;font-size:13px;color:var(--text-dim);line-height:1.7;font-style:italic;}
  .card-greeting strong{color:var(--cream);font-style:normal;}

  /* Preços */
  .card-prices{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);margin:24px 36px 0;border-radius:4px;overflow:hidden;}
  .price-cell{background:var(--card);padding:18px 16px;text-align:center;}
  .price-cell .lbl{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;}
  .price-cell .val{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold-light);line-height:1;}
  .price-cell .sub{font-size:9px;color:var(--text-dim);margin-top:4px;}

  /* Trend */
  .card-trend{padding:24px 36px 0;}
  .trend-label{display:flex;justify-content:space-between;font-size:10px;margin-bottom:6px;}
  .trend-label span:first-child{color:var(--text-dim);}
  .trend-label span:last-child{color:var(--gold-light);font-family:'Cormorant Garamond',serif;font-size:14px;}
  .trend-track{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}
  .trend-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold-light));border-radius:2px;}

  /* Bullets */
  .card-bullets{padding:24px 36px 0;}
  .card-bullets-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
  .bullet-item{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;font-size:12px;color:var(--text-dim);line-height:1.5;}
  .card.comprador .bullet-item::before{content:'◆';color:#7fc99a;font-size:7px;margin-top:4px;flex-shrink:0;}
  .card.vendedor .bullet-item::before{content:'◆';color:var(--gold-dim);font-size:7px;margin-top:4px;flex-shrink:0;}

  /* Insight */
  .card-insight{margin:24px 36px 0;background:rgba(201,168,76,0.05);border:1px solid rgba(201,168,76,0.2);border-radius:4px;padding:18px 20px;}
  .insight-header{font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
  .insight-body{font-size:12px;color:var(--text-dim);line-height:1.7;}
  .insight-body strong{color:var(--cream);}
  .insight-source{font-size:9px;color:var(--gold-dim);margin-top:8px;}

  /* Nota */
  .card-note{margin:24px 36px 0;padding:18px 20px;border-left:2px solid var(--gold);border-radius:0 4px 4px 0;font-size:12px;color:var(--text-dim);line-height:1.7;font-style:italic;}
  .card.comprador .card-note{background:rgba(127,201,154,0.05);}
  .card.vendedor .card-note{background:rgba(201,168,76,0.06);}
  .card-note strong{color:var(--gold-light);font-style:normal;}

  /* CTA */
  .card-cta{padding:20px 36px 32px;}
  .cta-box{background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.22);border-radius:4px;padding:18px 20px;display:flex;justify-content:space-between;align-items:center;gap:16px;}
  .cta-text{font-size:11px;color:var(--text-dim);line-height:1.6;}
  .cta-text strong{color:var(--cream);display:block;margin-bottom:3px;font-size:12px;}
  .cta-contact{font-size:11px;color:var(--gold);margin-top:6px;font-weight:500;}

  /* Footer */
  .card-footer{padding:18px 36px 24px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .card-footer .sig{font-family:'Dancing Script',cursive;font-size:20px;color:var(--gold);}
  .card-footer .date{font-size:9px;letter-spacing:1.5px;color:var(--text-dim);text-transform:uppercase;margin-top:2px;}

  /* Acções */
  .actions{margin-top:20px;display:none;gap:12px;width:100%;max-width:600px;}
  .action-btn{flex:1;padding:12px;border-radius:3px;font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-family:'Montserrat',sans-serif;border:1px solid var(--border);background:transparent;color:var(--text-dim);}
  .action-btn:hover{border-color:var(--gold);color:var(--gold);}

  @media print{
    body{background:white!important;padding:0;}
    body::before{display:none;}
    .editor,.actions{display:none!important;}
    .card-wrap{display:block!important;}
    .card{box-shadow:none;}
  }
  @media(max-width:500px){
    .card-prices{grid-template-columns:1fr 1fr;}
    .card-header,.card-greeting,.card-bullets,.card-trend,.card-note,.card-cta,.card-footer,.card-insight{padding-left:20px;padding-right:20px;}
    .card-prices{margin-left:20px;margin-right:20px;}
  }

@media print{
    *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
    body{background:white!important;color:#1a1a1a!important;padding:0;margin:0;}
    body::before{display:none;}
    .editor,.actions{display:none!important;}
    .card-wrap{display:block!important;margin:0;padding:0;}
    .card{box-shadow:none;border:1px solid #ddd;background:white!important;margin:0;}
    .card.comprador{background:white!important;}
    .card.vendedor{background:white!important;}
    .card-header{background:#f5f5f5!important;border-bottom:2px solid #1aaa96!important;padding:16px 24px 12px!important;}
    .card-badge{display:none!important;}
    .card-zona{color:#0d3d3a!important;font-size:28px!important;}
    .card-zona em{color:#1aaa96!important;}
    .card-regiao{color:#666!important;}
    .card-eyebrow{color:#1aaa96!important;font-size:8px!important;}
    .card-greeting{padding:12px 24px 0!important;font-size:11px!important;}
    .card-greeting strong{color:#1a1a1a!important;}
    .card-prices{margin:12px 24px 0!important;}
    .price-cell{background:#f8f8f8!important;padding:10px 8px!important;}
    .price-cell .lbl{color:#666!important;font-size:7px!important;}
    .price-cell .val{color:#0d3d3a!important;font-size:16px!important;}
    .card-trend{padding:10px 24px 0!important;}
    .trend-label span:first-child{color:#666!important;font-size:9px!important;}
    .trend-label span:last-child{color:#0d3d3a!important;font-size:12px!important;}
    .trend-track{background:#eee!important;}
    .trend-fill{background:#1aaa96!important;}
    .card-bullets{padding:10px 24px 0!important;}
    .card-bullets-title{color:#1aaa96!important;font-size:8px!important;}
    .bullet-item{color:#444!important;font-size:10px!important;padding:3px 0!important;}
    .card.comprador .bullet-item::before{color:#1aaa96!important;}
    .card.vendedor .bullet-item::before{color:#c9a84c!important;}
    .card-insight{margin:10px 24px 0!important;padding:10px 14px!important;background:#f8f8f8!important;border-color:#ddd!important;}
    .insight-header{color:#1aaa96!important;font-size:7px!important;margin-bottom:6px!important;}
    .insight-body{color:#333!important;font-size:10px!important;}
    .insight-body strong{color:#1a1a1a!important;}
    .insight-source{color:#999!important;font-size:8px!important;}
    .card-note{margin:10px 24px 0!important;padding:10px 14px!important;background:#f8f8f8!important;border-left-color:#c9a84c!important;color:#444!important;font-size:10px!important;}
    .card-note strong{color:#0d3d3a!important;}
    .card-cta{padding:10px 24px 16px!important;}
    .cta-box{background:#f8f8f8!important;border-color:#ddd!important;padding:12px 14px!important;}
    .cta-text{color:#444!important;font-size:10px!important;}
    .cta-text strong{color:#1a1a1a!important;font-size:11px!important;}
    .cta-contact{color:#1aaa96!important;font-size:10px!important;}
    .card-footer{padding:10px 24px 14px!important;border-top-color:#ddd!important;}
    .sig{color:#c9a84c!important;font-size:16px!important;}
    .date{color:#666!important;font-size:8px!important;}
  }
</style>
</head>
<body>

<div class="editor" id="editor">
  <div class="editor-title">🧭 Bússola Imobiliária · Gerar Cartão de Zona</div>

  <!-- SELECTOR DE PERFIL -->
  <div class="field-group">
    <label class="field-label">Perfil do destinatário</label>
    <div class="perfil-selector">
      <button class="perfil-btn active" id="btnComprador" onclick="setPerfil('comprador')">
        <span class="icon">🏡</span>Comprador
      </button>
      <button class="perfil-btn" id="btnVendedor" onclick="setPerfil('vendedor')">
        <span class="icon">🔑</span>Vendedor / FSBO
      </button>
    </div>
  </div>

  <div class="field-group">
    <label class="field-label">Nome</label>
    <input class="field-input" id="fNome" type="text" placeholder="Ex: João Silva">
  </div>

  <div class="field-group">
    <label class="field-label">Região</label>
    <select class="field-select" id="fRegiao" onchange="updateZonas()">
      <option value="benavente">Benavente</option>
      <option value="setubal">Setúbal</option>
    </select>
  </div>

  <div class="field-group">
    <label class="field-label">Zona</label>
    <select class="field-select" id="fZona"></select>
  </div>

  <div class="field-group">
    <label class="field-label" id="notaLabel">Nota personalizada (opcional)</label>
    <textarea class="field-textarea" id="fNota" placeholder=""></textarea>
  </div>

  <div class="field-group">
    <label class="field-label">Contacto</label>
    <input class="field-input" id="fContacto" type="text" placeholder="Ex: +351 912 345 678">
  </div>

  <button class="btn-generate" onclick="gerarCard()">Gerar Cartão</button>
</div>

<div class="card-wrap" id="cardWrap">
  <div class="card" id="card">
    <div class="card-header">
      <div class="card-eyebrow">🧭 Bússola Imobiliária · Análise de Zona · Abril 2026</div>
      <div class="card-zona" id="cZona"></div>
      <div class="card-regiao" id="cRegiao"></div>
    </div>
    <div class="card-greeting" id="cGreeting"></div>
    <div class="card-prices" id="cPrices"></div>
    <div class="card-trend" id="cTrend"></div>
    <div class="card-bullets" id="cBullets"></div>
    <div class="card-insight" id="cInsight"></div>
    <div class="card-note" id="cNote" style="display:none"></div>
    <div class="card-cta" id="cCta"></div>
    <div class="card-footer">
      <div>
        <div class="sig">Patrícia Leal · Bússola Imobiliária</div>
        <div class="date" id="cDate"></div>
      </div>
      <span style="font-size:22px;">🧭</span>
    </div>
  </div>
</div>

<div class="actions" id="actions">
  <button class="action-btn" onclick="voltarEditar()">← Editar</button>
  <button class="action-btn" onclick="window.print()">🖨 Imprimir / PDF</button>
</div>

<script>
let perfilActivo = 'comprador';

function setPerfil(p){
  perfilActivo = p;
  document.getElementById('btnComprador').classList.toggle('active', p==='comprador');
  document.getElementById('btnVendedor').classList.toggle('active', p==='vendedor');
  const notaLabel = document.getElementById('notaLabel');
  const notaField = document.getElementById('fNota');
  if(p==='vendedor'){
    notaLabel.textContent = 'Argumento personalizado (opcional)';
    notaField.placeholder = 'Ex: O mercado está a absorver imóveis como o seu em menos de 60 dias. Posso apresentar-lhe uma avaliação sem compromisso.';
  } else {
    notaLabel.textContent = 'Nota personalizada (opcional)';
    notaField.placeholder = 'Ex: Conforme conversámos, esta zona encaixa no seu perfil pela proximidade a Lisboa e a escolas internacionais...';
  }
}

function updateZonas(){
  const regiao = document.getElementById('fRegiao').value;
  const select = document.getElementById('fZona');
  select.innerHTML = '';
  Object.keys(DATA[regiao].zonas).forEach(z=>{
    const opt = document.createElement('option');
    opt.value = z; opt.textContent = z;
    select.appendChild(opt);
  });
}
updateZonas();

function gerarCard(){
  const nome = document.getElementById('fNome').value.trim();
  const regiao = document.getElementById('fRegiao').value;
  const zona = document.getElementById('fZona').value;
  const nota = document.getElementById('fNota').value.trim();
  const contacto = document.getElementById('fContacto').value.trim();
  const perfil = perfilActivo;

  const rd = DATA[regiao];
  const zd = rd.zonas[zona];
  const regiaoLabel = regiao === 'benavente' ? 'Concelho de Benavente · Santarém' : 'Distrito de Setúbal';

  // Classe do card
  const card = document.getElementById('card');
  card.className = 'card ' + perfil;

  // Badge de perfil
  // perfil aplicado no className do card abaixo

  // Zona e região
  document.getElementById('cZona').innerHTML = '<em>' + zona + '</em>';
  document.getElementById('cRegiao').textContent = regiaoLabel + ' · ' + zd.tag;

  // Saudação
  const nomeHtml = nome ? `Prezado/a <strong>${nome}</strong>,` : (perfil==='comprador' ? 'Prezado/a cliente,' : 'Prezado/a proprietário/a,');
  document.getElementById('cGreeting').innerHTML = perfil === 'comprador'
    ? zd.greetingComprador(nome)
    : zd.greetingVendedor(nome);

  // Preços
  document.getElementById('cPrices').innerHTML = zd.preco.map((v,i)=>
    `<div class="price-cell"><div class="lbl">${zd.precoLabel[i]}</div><div class="val">${v}</div></div>`
  ).join('');

  // Trend
  const trendLabel = perfil === 'comprador' ? 'Índice de Procura · ' + zona : 'Pressão de Compradores · ' + zona;
  document.getElementById('cTrend').innerHTML = `
    <div class="trend-label"><span>${trendLabel}</span><span>${zd.procuraLabel}</span></div>
    <div class="trend-track"><div class="trend-fill" style="width:${zd.procura}%"></div></div>
    <div style="margin-top:10px;" class="trend-label">
      <span>Variação Anual · ${regiao==='benavente'?'Benavente':'Setúbal'}</span>
      <span>${rd.macro}</span>
    </div>`;

  // Bullets
  const bullets = perfil === 'comprador' ? zd.bulletsComprador : zd.bulletsVendedor;
  const bulletsTitle = perfil === 'comprador' ? 'O que saber antes de comprar' : 'O que o mercado diz sobre a sua zona';
  document.getElementById('cBullets').innerHTML =
    `<div class="card-bullets-title">${bulletsTitle}</div>` +
    bullets.map(b=>`<div class="bullet-item">${b}</div>`).join('');

  // Insight
  document.getElementById('cInsight').innerHTML = `
    <div class="insight-header">📊 Insight do Mês · Abril 2026</div>
    <div class="insight-body">${zd.insight}</div>
    <div class="insight-source">Fonte: Idealista, Imovirtual, Supercasa · Análise Bússola Imobiliária</div>`;

  // Nota
  const noteEl = document.getElementById('cNote');
  if(nota){
    noteEl.innerHTML = `<strong>${perfil==='vendedor'?'Nota da consultora:':'Nota pessoal:'}</strong> ${nota}`;
    noteEl.style.display = 'block';
  } else {
    noteEl.style.display = 'none';
  }

  // CTA
  const ctaText = perfil === 'comprador' ? zd.ctaComprador : zd.ctaVendedor;
  const ctaContacto = contacto || '+351 — — —';
  document.getElementById('cCta').innerHTML = `
    <div class="cta-box">
      <div class="cta-text">
        <strong>${perfil==='comprador'?'Quer avançar?':'Quer saber o que vale o seu imóvel?'}</strong>
        ${ctaText}
        <div class="cta-contact">📞 ${ctaContacto}</div>
      </div>
    </div>`;

  // Data
  document.getElementById('cDate').textContent = new Date().toLocaleDateString('pt-PT',{month:'long',year:'numeric'});

  // Mostrar
  document.getElementById('editor').style.display = 'none';
  document.getElementById('cardWrap').style.display = 'block';
  document.getElementById('actions').style.display = 'flex';
}

function voltarEditar(){
  document.getElementById('editor').style.display = 'block';
  document.getElementById('cardWrap').style.display = 'none';
  document.getElementById('actions').style.display = 'none';
}
